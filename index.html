
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cenner - Freelance Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                green: '#4ade80',
                pink: '#f472b6',
                black: '#0a0a0a',
                grey: '#1a1a1a',
              },
            },
            animation: {
              'gradient': 'gradient 8s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              gradient: {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              },
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --transition-speed: 0.3s;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: #f3f4f6;
        margin: 0;
        overflow-x: hidden;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #262626;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4ade80;
      }

      .animate-gradient {
        background-size: 200% auto;
      }

      /* Custom slider — Cenner Budget Threshold */
      .cenner-slider {
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #4ade80 var(--slider-pct, 50%), #1a1a1a var(--slider-pct, 50%));
        outline: none;
        border: none;
      }
      .cenner-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #4ade80;
        cursor: pointer;
        box-shadow: 0 0 0 4px rgba(74,222,128,0.15), 0 2px 8px rgba(0,0,0,0.5);
        transition: box-shadow 0.2s, transform 0.15s;
      }
      .cenner-slider::-webkit-slider-thumb:hover {
        box-shadow: 0 0 0 8px rgba(74,222,128,0.2), 0 2px 12px rgba(0,0,0,0.6);
        transform: scale(1.1);
      }
      .cenner-slider::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #4ade80;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 0 4px rgba(74,222,128,0.15);
      }
      .cenner-slider::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #4ade80 var(--slider-pct, 50%), #1a1a1a var(--slider-pct, 50%));
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",

    "react-router-dom": "https://esm.sh/react-router-dom@7.1.1?deps=react@19.0.0,react-dom@19.0.0",
    "lucide-react": "https://esm.sh/lucide-react@0.469.0?deps=react@19.0.0",
    "firebase/app": "https://esm.sh/firebase@10.8.0/app",
    "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
<script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>

</html>
