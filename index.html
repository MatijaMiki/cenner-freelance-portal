            },
            keyframes: {
              gradient: {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              },
              notifySlideIn: {
                '0%':   { opacity: '0', transform: 'translateX(16px) scale(0.97)' },

    <style>
      :root {
        --transition-speed: 0.3s;
      }

      @keyframes notifySlideIn {
        0%   { opacity: 0; transform: translateX(16px) scale(0.97); }
        100% { opacity: 1; transform: translateX(0)    scale(1); }
      }

      html, body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: #f3f4f6;
        margin: 0;
        overflow-x: hidden;
        max-width: 100vw;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #262626;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4ade80;
      }

      .animate-gradient {
        background-size: 200% auto;
      }

      /* Custom slider — Cenner Budget Threshold */
      .cenner-slider {
        -webkit-appearance: none;
        appearance: none;
        height: 24px;
        background: transparent;
        outline: none;
        border: none;
        touch-action: pan-y;
      }
      .cenner-slider::-webkit-slider-runnable-track {
        -webkit-appearance: none;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #4ade80 var(--slider-pct, 50%), #1a1a1a var(--slider-pct, 50%));
      }
      .cenner-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        margin-top: -9px;
        border-radius: 50%;
        background: #4ade80;
        cursor: grab;
        box-shadow: 0 0 0 4px rgba(74,222,128,0.15), 0 2px 8px rgba(0,0,0,0.5);
        transition: box-shadow 0.2s, transform 0.15s;
      }
      .cenner-slider::-webkit-slider-thumb:hover {
        box-shadow: 0 0 0 8px rgba(74,222,128,0.2), 0 2px 12px rgba(0,0,0,0.6);
        transform: scale(1.1);
      }
      .cenner-slider:active::-webkit-slider-thumb {
        cursor: grabbing;
      }
      .cenner-slider::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #4ade80 var(--slider-pct, 50%), #1a1a1a var(--slider-pct, 50%));
      }
      .cenner-slider::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #4ade80;
        cursor: grab;
        border: none;
        box-shadow: 0 0 0 4px rgba(74,222,128,0.15);
      }
      .cenner-slider:active::-moz-range-thumb {
        cursor: grabbing;
      }
    </style>
