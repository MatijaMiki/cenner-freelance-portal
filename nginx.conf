# Redirect www to non-www
server {
    listen 80;
    server_name www.cenner.hr;
    return 301 $scheme://cenner.hr$request_uri;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html must never be cached — stale cache causes MIME errors after redeploy
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA manifest needs correct MIME type (not in default nginx mime.types)
    location ~* \.webmanifest$ {
        default_type application/manifest+json;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json;
}
